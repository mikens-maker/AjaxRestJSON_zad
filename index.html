<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f4;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Lista użytkowników</h1>

  <button id="load-users">Pobierz użytkowników</button>

  <ul id="user-list"></ul>

  <script>
    const button = document.getElementById("load-users");
    const userList = document.getElementById("user-list");

    button.addEventListener("click", () => {
      userList.innerHTML = "";

      fetch("https://jsonplaceholder.typicode.com/users")
        .then(response => {
          if (!response.ok) {
            throw new Error("Błąd sieci");
          }
          return response.json();
        })
        .then(users => {
          users.forEach(user => {
            const li = document.createElement("li");
            li.innerHTML = `
              <strong>${user.name}</strong><br>
              ${user.email}
            `;
            userList.appendChild(li);
          });
        })
        .catch(error => {
          const li = document.createElement("li");
          li.textContent = "Błąd ładowania danych";
          li.classList.add("error");
          userList.appendChild(li);

          console.error(error);
        });
    });
  </script>
</body>
</html>
