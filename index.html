<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cwiczenia z AjaxREstJson</title>
</head>
<body>
    <script>
    // ćw.1 JSON

    const books = [
        { title: "Władca Pierścieni", author: "J.R.R. Tolkien" },
        { title: "Lalka", author: "Bolesław Prus" },
        { title: "1984", author: "George Orwell" }
    ];
    const booksJSON = JSON.stringify(books);
    console.log("Ćwiczenie 1 - JSON:");
    console.log(booksJSON);

    // ćw.2 REST

    console.log("Ćwiczenie 2 - REST:");
    console.log("Dodanie nowego komentarza -> POST");
    console.log("Wyświetlenie listy znajomych -> GET");
    console.log("Zmiana hasła użytkownika -> PUT / PATCH");

    // ćw.3 FETCH i API

    console.log("Ćwiczenie 3 - Losowe zdjęcie psa:");
    fetch('https://dog.ceo/api/breeds/image/random')
        .then(response => {
            if (!response.ok) {
                throw new Error("Błąd sieci");
            }
            return response.json();
        })
        .then(data => {
            console.log("Adres zdjęcia psa:", data.message);
            const img = document.createElement("img");
            img.src = data.message;
            img.width = 300;
            document.body.appendChild(img);
        })
        .catch(error => {
            console.error("Wystąpił błąd:", error);
        });
    </script>
</body>
</html>
